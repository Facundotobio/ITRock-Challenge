version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: itrock_postgres_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itrock_network

  api_service:
    image: itrock-challenge-api:latest
    container_name: itrock_api_container
    build:
      context: .
      dockerfile: Docker/Dockerfile
    ports:
      - "7271:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres_db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=ITRockChallengeAPI
      - Jwt__Audience=ITRockChallengeUsers
      - Jwt__ExpiryInMinutes=60
      - JsonPlaceholderSettings__BaseUrl=${JSON_PLACEHOLDER_BASE_URL:-https://jsonplaceholder.typicode.com}
    depends_on:
      - postgres_db
    networks:
      - itrock_network

volumes:
  postgres_data:

networks:
  itrock_network:
    driver: bridge